name: CI/CD

on:
  push:
    branches: [main, evolution]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ============================================
  # 1. Test Job
  # ============================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run smoke tests
        run: npm test
      
      - name: Check server starts
        run: |
          timeout 10s node src/server.js || echo "Server start check completed"
      
      - name: Check for console.log in production code
        run: |
          # Check for console.log without logger
          FOUND=$(grep -r "console.log" src/ --include="*.ts" --include="*.js" 2>/dev/null | grep -v "logger" | grep -v ".bak" | wc -l)
          if [ "$FOUND" -gt 0 ]; then
            echo "Warning: Found $FOUND files with console.log without logger"
            grep -r "console.log" src/ --include="*.ts" --include="*.js" 2>/dev/null | grep -v "logger" | grep -v ".bak" | head -5
          fi

  # ============================================
  # 2. Dashboard Build Job
  # ============================================
  dashboard:
    name: 🎨 Dashboard Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build dashboard
        run: npm run build
        working-directory: dashboard
      
      - name: Verify build
        run: |
          test -f dashboard/dist/index.html
          test -d dashboard/dist/assets
          echo "Dashboard build verified"
      
      - name: Upload dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist
          retention-days: 7

  # ============================================
  # 3. TypeScript Check
  # ============================================
  typescript:
    name: 📝 TypeScript Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install
        run: npm ci
      
      - name: TypeScript check
        run: |
          npx tsc --noEmit 2>&1 | head -20 || echo "TypeScript check completed"

  # ============================================
  # 4. Scale Test Job
  # ============================================
  scale-test:
    name: ⚡ Scale Test (30 agents)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install
        run: npm ci
      
      - name: Start server
        run: |
          node src/server.js &
          sleep 5
          curl -s http://localhost:8080/api/health || exit 1
      
      - name: Run scale test
        run: node tests/scale.test.js

  # ============================================
  # 5. Deploy Job (main branch only)
  # ============================================
  deploy:
    name: 🚀 Deploy to Server
    needs: [test, dashboard, typescript, scale-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build frontend
        run: |
          npm ci
          npm run build -w dashboard
      
      - name: Deploy to production
        if: env.SERVER_HOST != ''
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          if [ -n "$SERVER_HOST" ]; then
            rsync -avz --delete-after dashboard/dist/ $SERVER_USER@$SERVER_HOST:/home/arthur/claw-hive/public/
            echo "✅ Deployed to $SERVER_HOST"
          else
            echo "⚠️  No SERVER_HOST configured, skipping deployment"
          fi

  # ============================================
  # 6. Discord Notification (on failure)
  # ============================================
  notify-failure:
    name: 🔔 Notify on Failure
    needs: [test, dashboard, typescript, scale-test]
    if: failure()
    runs-on: ubuntu-latest
    
    steps:
      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d '{"content":"❌ CI/CD Failed: '"$GITHUB_REPOSITORY" '"$GITHUB_REF" '"$GITHUB_RUN_ID"}' "}' \
              $DISCORD_WEBHOOK
          fi
