    <path d="M20,10 L18,12" stroke="#FF6B35" stroke-width="1"/>
  </g>
  
  <!-- Hexagon 4 - Happy -->
  <polygon points="75,60 90,67 90,83 75,90 60,83 60,67" fill="#fff" stroke="#FF6B35" stroke-width="2"/>
  <g transform="translate(67,68) scale(0.25)">
