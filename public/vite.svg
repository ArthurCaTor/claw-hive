<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Orange hexagon background -->
  <polygon points="16,2 29,9 29,23 16,30 3,23 3,9" fill="#FF6B35"/>
  <!-- White hexagon inner -->
  <polygon points="16,5 25,11 25,21 16,27 7,21 7,11" fill="#fff"/>
  <!-- Simple lobster body -->
  <ellipse cx="16" cy="17" rx="5" ry="4" fill="#FF6B35"/>
  <!-- Eyes -->
  <circle cx="14" cy="15" r="1" fill="#000"/>
  <circle cx="18" cy="15" r="1" fill="#000"/>
  <!-- Claws -->
  <circle cx="11" cy="16" r="2" fill="#FF6B35"/>
  <circle cx="21" cy="16" r="2" fill="#FF6B35"/>
  <!-- Antennae -->
  <path d="M14,13 Q12,10 13,8" stroke="#FF6B35" stroke-width="0.8" fill="none"/>
  <path d="M18,13 Q20,10 19,8" stroke="#FF6B35" stroke-width="0.8" fill="none"/>
  <!-- Tail -->
  <path d="M14,21 Q16,24 18,21" fill="#FF8C42"/>
</svg>
