    <rect x="8" y="14" width="3" height="4" fill="#666"/>
    <rect x="21" y="14" width="3" height="4" fill="#666"/>
  </g>
  
  <!-- Hexagon 2 - Sleeping -->
  <polygon points="75,10 90,17 90,33 75,40 60,33 60,17" fill="#fff" stroke="#FF6B35" stroke-width="2"/>
  <g transform="translate(67,18) scale(0.25)">
