<text x="1105" y="388" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Prometheus</text>

<!-- Services Row 2 -->
<rect x="180" y="440" width="150" height="80" rx="8" fill="#059669"/>
<text x="255" y="470" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Message Optimizer</text>
<text x="255" y="488" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Active Mode</text>

<rect x="350" y="440" width="150" height="80" rx="8" fill="#0891B2"/>
<text x="425" y="470" font-family="Arial" font-size="11" fill="white" text-anchor="middle">WebSocket Server</text>
<text x="425" y="488" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Real-time Updates</text>

<rect x="520" y="440" width="150" height="80" rx="8" fill="#0D9488"/>
