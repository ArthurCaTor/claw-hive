<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1150" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
  </marker>
  <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.1"/>
    <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.1"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#FAFAFA"/>

<!-- Title -->
<text x="700" y="35" font-family="Arial" font-size="28" font-weight="bold" fill="#1E293B" text-anchor="middle">Claw-Hive System Architecture</text>
<text x="700" y="60" font-family="Arial" font-size="14" fill="#64748B" text-anchor="middle">Multi-Agent LLM Gateway with Real-Time Monitoring &amp; PostgreSQL Sync</text>

<!-- ============ LAYER 1: Users ============ -->
<rect x="50" y="80" width="1300" height="80" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
<text x="70" y="105" font-family="Arial" font-size="12" font-weight="bold" fill="#4F46E5">USERS (Telegram)</text>

<g transform="translate(100, 115)">
  <rect x="0" y="0" width="150" height="40" rx="8" fill="#4F46E5" filter="url(#shadow)"/>
  <text x="75" y="15" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Arthur Wang</text>
  <text x="75" y="30" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Admin</text>
</g>
<g transform="translate(280, 115)">
  <rect x="0" y="0" width="150" height="40" rx="8" fill="#4F46E5" filter="url(#shadow)"/>
  <text x="75" y="15" font-family="Arial" font-size="11" fill="white" text-anchor="middle">API Clients</text>
  <text x="75" y="30" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">REST/WebSocket</text>
</g>

<!-- ============ LAYER 2: Gateway ============ -->
<line x1="175" y1="155" x2="700" y2="190" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="355" y1="155" x2="700" y2="190" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

<rect x="550" y="190" width="300" height="45" rx="10" fill="#7C3AED" filter="url(#shadow)"/>
<text x="700" y="220" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">OpenClaw Gateway</text>

