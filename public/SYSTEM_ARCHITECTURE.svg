<text x="595" y="488" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Capture Files</text>

<!-- ============ LAYER 4: API Endpoints ============ -->
<line x1="700" y1="550" x2="700" y2="580" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

<rect x="50" y="580" width="1300" height="60" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
<text x="70" y="605" font-family="Arial" font-size="10" font-weight="bold" fill="#64748B">API Endpoints:</text>
<text x="70" y="625" font-family="Courier" font-size="9" fill="#475569">/api/health | /api/debug-proxy/captures | /api/stats/tokens | /api/cost/summary | /api/llm-tracker/* | /api/alerts/* | /metrics</text>

<!-- ============ LAYER 5: Sync Worker ============ -->
<line x1="700" y1="640" x2="700" y2="670" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

<rect x="150" y="670" width="1100" height="100" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
<text x="170" y="695" font-family="Arial" font-size="12" font-weight="bold" fill="#EA580C">Sync Worker (Background Process)</text>
<text x="170" y="715" font-family="Arial" font-size="10" fill="#64748B">chokidar file watcher + Batch insert to PostgreSQL + Checkpoint resume</text>

<rect x="200" y="725" width="120" height="35" rx="6" fill="#EA580C"/>
<text x="260" y="748" font-family="Arial" font-size="10" fill="white" text-anchor="middle">File Watcher</text>

