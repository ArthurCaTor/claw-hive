<text x="170" y="320" font-family="Arial" font-size="10" fill="#64748B">TypeScript + WebSocket + Prometheus Metrics</text>

<!-- Services Row 1 -->
<rect x="180" y="340" width="150" height="80" rx="8" fill="#059669"/>
<text x="255" y="370" font-family="Arial" font-size="11" fill="white" text-anchor="middle">LLM Proxy</text>
<text x="255" y="388" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Passive Mode</text>

