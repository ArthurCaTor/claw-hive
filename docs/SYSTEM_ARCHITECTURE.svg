<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
  </marker>
  <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.1"/>
    <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.1"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#FAFAFA"/>

<!-- Title -->
<text x="700" y="40" font-family="Arial" font-size="26" font-weight="bold" fill="#1E293B" text-anchor="middle">Claw-Hive System Architecture</text>
<text x="700" y="65" font-family="Arial" font-size="14" fill="#64748B" text-anchor="middle">Multi-Agent LLM Gateway with Debug Proxy</text>

<!-- LAYER 1: Users -->
