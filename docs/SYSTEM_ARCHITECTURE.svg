<text x="700" y="280" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">OpenClaw Gateway</text>

<!-- Arrow to Server -->
<line x1="700" y1="300" x2="700" y2="340" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

<!-- LAYER 3: claw-hive Server -->
<rect x="300" y="340" width="800" height="200" rx="12" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
