</g>

<!-- Arrows to Gateway -->
<line x1="160" y1="180" x2="700" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="340" y1="180" x2="700" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="520" y1="180" x2="700" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="700" y1="180" x2="700" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="880" y1="180" x2="700" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="1060" y1="180" x2="700" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

