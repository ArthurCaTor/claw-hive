  <rect x="0" y="0" width="110" height="35" rx="4" fill="#0891B2"/>
  <text x="55" y="15" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Agent 2</text>
  <text x="55" y="27" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">MiniMax</text>
</g>
<g transform="translate(610, 410)">
  <rect x="0" y="0" width="110" height="35" rx="4" fill="#0891B2"/>
  <text x="55" y="15" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Agent 3</text>
  <text x="55" y="27" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">OpenAI</text>
</g>
<g transform="translate(740, 410)">
  <rect x="0" y="0" width="110" height="35" rx="4" fill="#0891B2"/>
  <text x="55" y="15" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Agent 4</text>
  <text x="55" y="27" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">OpenAI</text>
</g>
<g transform="translate(870, 410)">
  <rect x="0" y="0" width="110" height="35" rx="4" fill="#0891B2"/>
  <text x="55" y="15" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Agent 5</text>
  <text x="55" y="27" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">Claude</text>
</g>
<g transform="translate(1000, 410)">
  <rect x="0" y="0" width="110" height="35" rx="4" fill="#0891B2"/>
  <text x="55" y="15" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Agent 6</text>
  <text x="55" y="27" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">Claude</text>
</g>

<!-- Memory Management Box -->
<rect x="350" y="460" width="720" height="65" rx="6" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1"/>
<text x="370" y="485" font-family="Arial" font-size="12" font-weight="bold" fill="#92400E">Memory Management</text>
<text x="370" y="505" font-family="Arial" font-size="10" fill="#92400E">• conversation history (sliding window)</text>
<text x="370" y="520" font-family="Arial" font-size="10" fill="#92400E">• context window • variables • short/long term memory</text>

<!-- Arrow to LLM -->
<line x1="700" y1="540" x2="700" y2="580" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

<!-- LAYER 4: LLM Providers -->
<rect x="300" y="580" width="800" height="80" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
<text x="350" y="605" font-family="Arial" font-size="12" font-weight="bold" fill="#EA580C">LLM Providers</text>

<g transform="translate(380, 615)">
  <rect x="0" y="0" width="140" height="35" rx="6" fill="#EA580C"/>
  <text x="70" y="15" font-family="Arial" font-size="11" fill="white" text-anchor="middle">MiniMax</text>
  <text x="70" y="28" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">api.minimax.io</text>
</g>
<g transform="translate(600, 615)">
  <rect x="0" y="0" width="140" height="35" rx="6" fill="#EA580C"/>
  <text x="70" y="15" font-family="Arial" font-size="11" fill="white" text-anchor="middle">OpenAI</text>
  <text x="70" y="28" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">api.openai.com</text>
</g>
<g transform="translate(820, 615)">
  <rect x="0" y="0" width="140" height="35" rx="6" fill="#EA580C"/>
  <text x="70" y="15" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Claude</text>
  <text x="70" y="28" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">api.anthropic.com</text>
</g>

<!-- Data Flow Arrows -->
<line x1="450" y1="595" x2="450" y2="615" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="670" y1="595" x2="670" y2="615" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="890" y1="595" x2="890" y2="615" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

<!-- LAYER 5: File System -->
<rect x="300" y="700" width="800" height="100" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
<text x="350" y="725" font-family="Arial" font-size="12" font-weight="bold" fill="#64748B">File System</text>

<g transform="translate(350, 740)">
  <text x="0" y="0" font-family="Courier" font-size="10" fill="#475569">~/.openclaw/workspace-{agent}/sessions/</text>
  <text x="0" y="15" font-family="Courier" font-size="10" fill="#475569">~/.openclaw/workspace-{agent}/memory/</text>
  <text x="0" y="30" font-family="Courier" font-size="10" fill="#475569">~/claw-hive/captures/call-*.json</text>
</g>

<g transform="translate(650, 740)">
  <text x="0" y="0" font-family="Courier" font-size="10" fill="#475569">openclaw.json (config)</text>
  <text x="0" y="15" font-family="Courier" font-size="10" fill="#475569">events.jsonl (session)</text>
  <text x="0" y="30" font-family="Courier" font-size="10" fill="#475569">long-term.json (memory)</text>
</g>

