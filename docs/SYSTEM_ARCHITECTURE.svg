<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#FAFAFA"/>

<!-- Title -->
<text x="600" y="40" font-family="Arial" font-size="28" font-weight="bold" fill="#1E293B" text-anchor="middle">Claw-Hive System Overview</text>
<text x="600" y="65" font-family="Arial" font-size="14" fill="#64748B" text-anchor="middle">Multi-Agent LLM Gateway with Monitoring</text>

<!-- ============ CORE SYSTEM BOX ============ -->
<rect x="50" y="90" width="520" height="520" rx="12" fill="#F0FDF4" stroke="#059669" stroke-width="3"/>
<text x="70" y="120" font-family="Arial" font-size="18" font-weight="bold" fill="#059669">CORE SYSTEM</text>
<text x="70" y="140" font-family="Arial" font-size="11" fill="#64748B">claw-hive Server (:8080)</text>

<!-- Core Components -->
<rect x="80" y="160" width="130" height="60" rx="8" fill="#059669"/>
<text x="145" y="190" font-family="Arial" font-size="11" fill="white" text-anchor="middle">LLM Proxy</text>
<text x="145" y="208" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Passive Mode</text>

<rect x="225" y="160" width="130" height="60" rx="8" fill="#0891B2"/>
<text x="290" y="190" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Token Stats</text>
<text x="290" y="208" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Aggregator</text>

<rect x="370" y="160" width="130" height="60" rx="8" fill="#DC2626"/>
<text x="435" y="190" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Cost Calculator</text>
<text x="435" y="208" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Tracking</text>

<rect x="80" y="235" width="130" height="60" rx="8" fill="#7C3AED"/>
<text x="145" y="265" font-family="Arial" font-size="11" fill="white" text-anchor="middle">LLM Tracker</text>
<text x="145" y="283" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Switches</text>

<rect x="225" y="235" width="130" height="60" rx="8" fill="#EA580C"/>
<text x="290" y="265" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Alert Service</text>
<text x="290" y="283" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">5 Rules</text>

<rect x="370" y="235" width="130" height="60" rx="8" fill="#475569"/>
<text x="435" y="265" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Prometheus</text>
<text x="435" y="283" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Metrics</text>

<rect x="80" y="310" width="130" height="60" rx="8" fill="#0891B2"/>
<text x="145" y="340" font-family="Arial" font-size="11" fill="white" text-anchor="middle">WebSocket</text>
<text x="145" y="358" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Real-time</text>

<rect x="225" y="310" width="130" height="60" rx="8" fill="#06B6D4"/>
<text x="290" y="340" font-family="Arial" font-size="11" fill="white" text-anchor="middle">JSONL Files</text>
<text x="290" y="358" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Captures</text>

<rect x="370" y="310" width="130" height="60" rx="8" fill="#8B5CF6"/>
<text x="435" y="340" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Dashboard</text>
<text x="435" y="358" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">React UI</text>

<!-- Users -->
<rect x="80" y="390" width="420" height="50" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
<text x="290" y="420" font-family="Arial" font-size="12" fill="#4F46E5" text-anchor="middle">Users: Telegram | REST API | WebSocket | Dashboard | Prometheus | Grafana</text>

<!-- LLM Providers -->
<rect x="80" y="455" width="420" height="50" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
<text x="290" y="485" font-family="Arial" font-size="12" fill="#EA580C" text-anchor="middle">LLM Providers: MiniMax | OpenAI | Anthropic</text>

<!-- Feature Tags -->
<text x="540" y="520" font-family="Arial" font-size="10" fill="#059669">✅ TypeScript 100%</text>
<text x="540" y="535" font-family="Arial" font-size="10" fill="#059669">✅ WebSocket Real-time</text>
<text x="540" y="550" font-family="Arial" font-size="10" fill="#059669">✅ CI/CD Pipeline</text>
<text x="540" y="565" font-family="Arial" font-size="10" fill="#059669">✅ 21+ API Endpoints</text>
<text x="540" y="580" font-family="Arial" font-size="10" fill="#059669">✅ Unit + Scale Tests</text>

<!-- Arrow to detail -->
<rect x="540" y="100" width="130" height="35" rx="17" fill="#059669"/>
<text x="605" y="122" font-family="Arial" font-size="10" fill="white" text-anchor="middle">View Detail →</text>
<text x="605" y="580" font-family="Courier" font-size="9" fill="#64748B" text-anchor="middle">SYSTEM_ARCHITECTURE_CORE.svg</text>

<!-- ============ SIDECAR BOX ============ -->
<rect x="620" y="90" width="530" height="520" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="3" stroke-dasharray="8,4"/>
<text x="640" y="120" font-family="Arial" font-size="18" font-weight="bold" fill="#EA580C">SIDECAR / AUXILIARY</text>
<text x="640" y="140" font-family="Arial" font-size="11" fill="#64748B">100% Independent - Core does NOT depend on these</text>

<!-- Warning Badge -->
<rect x="900" y="115" width="220" height="30" rx="15" fill="#FEE2E2"/>
<text x="1010" y="135" font-family="Arial" font-size="10" fill="#DC2626" text-anchor="middle">⚠️ If fails: Core continues</text>

<!-- Sync Worker Box -->
<rect x="660" y="170" width="450" height="180" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="680" y="200" font-family="Arial" font-size="14" font-weight="bold" fill="#EA580C">Sync Worker</text>
<text x="680" y="220" font-family="Arial" font-size="10" fill="#64748B">Background process: JSONL → PostgreSQL</text>

<rect x="680" y="240" width="100" height="50" rx="6" fill="#EA580C"/>
<text x="730" y="265" font-family="Arial" font-size="10" fill="white" text-anchor="middle">File Watcher</text>
<text x="730" y="282" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">chokidar</text>

<rect x="795" y="240" width="100" height="50" rx="6" fill="#EA580C"/>
<text x="845" y="265" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Batch Buffer</text>
<text x="845" y="282" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">100 records</text>

<rect x="910" y="240" width="100" height="50" rx="6" fill="#EA580C"/>
<text x="960" y="265" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Checkpoint</text>
<text x="960" y="282" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">Resume</text>

<rect x="680" y="305" width="100" height="50" rx="6" fill="#EA580C"/>
<text x="730" y="330" font-family="Arial" font-size="10" fill="white" text-anchor="middle">PG Client</text>
<text x="730" y="347" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">node-postgres</text>

<rect x="795" y="305" width="215" height="50" rx="6" fill="#EA580C"/>
<text x="902" y="330" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Error Handler (Retry)</text>
<text x="902" y="347" font-family="Arial" font-size="8" fill="#DDD" text-anchor="middle">Graceful degradation</text>

<!-- PostgreSQL Box -->
<rect x="660" y="365" width="450" height="80" rx="10" fill="#F1F5F9" stroke="#3B82F6" stroke-width="2"/>
<text x="680" y="395" font-family="Arial" font-size="14" font-weight="bold" fill="#3B82F6">PostgreSQL (Optional)</text>
<text x="680" y="415" font-family="Arial" font-size="10" fill="#64748B">openclaw_memory.claw_hive | captures | llm_switches</text>
<text x="680" y="435" font-family="Arial" font-size="9" fill="#94A3B8">For analytics only - Core system works without this</text>

<!-- Management -->
<rect x="660" y="460" width="450" height="130" rx="10" fill="#F0FDF4" stroke="#059669" stroke-width="1"/>
<text x="680" y="490" font-family="Arial" font-size="13" font-weight="bold" fill="#059669">Management (fix-proxy.sh)</text>
<text x="680" y="515" font-family="Courier" font-size="10" fill="#475569">./fix-proxy.sh sync-start   # Start</text>
<text x="680" y="535" font-family="Courier" font-size="10" fill="#475569">./fix-proxy.sh sync-stop    # Stop</text>
<text x="680" y="555" font-family="Courier" font-size="10" fill="#475569">./fix-proxy.sh sync-status  # Status</text>
<text x="680" y="575" font-family="Courier" font-size="10" fill="#475569">Logs: /tmp/sync-worker.log</text>

<!-- Arrow from Core to Sidecar -->
<line x1="570" y1="300" x2="660" y2="260" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
<text x="615" y="260" font-family="Arial" font-size="8" fill="#64748B" transform="rotate(-25, 615, 260)">async</text>

<!-- Legend -->
<rect x="50" y="630" width="1100" height="50" rx="8" fill="#1E293B"/>
<text x="70" y="655" font-family="Arial" font-size="10" fill="#94A3B8">Legend:</text>
<rect x="140" y="646" width="15" height="15" rx="3" fill="#059669"/>
<text x="162" y="658" font-family="Arial" font-size="9" fill="white">Core System</text>
<rect x="260" y="646" width="15" height="15" rx="3" fill="#EA580C"/>
<text x="282" y="658" font-family="Arial" font-size="9" fill="white">Sidecar</text>
<rect x="370" y="646" width="15" height="15" rx="3" fill="#3B82F6"/>
<text x="392" y="658" font-family="Arial" font-size="9" fill="white">PostgreSQL</text>
<line x1="490" y1="654" x2="520" y2="654" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5"/>
<text x="530" y="658" font-family="Arial" font-size="9" fill="white">Async/Optional</text>

<text x="1100" y="670" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="end">v2.2 | 2026-03-18</text>

</svg>
