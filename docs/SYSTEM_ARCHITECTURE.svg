  <rect x="350" y="-12" width="15" height="15" rx="2" fill="#0891B2"/>
  <text x="370" y="0" font-family="Arial" font-size="10" fill="#64748B">Agents</text>
  <rect x="420" y="-12" width="15" height="15" rx="2" fill="#EA580C"/>
  <text x="440" y="0" font-family="Arial" font-size="10" fill="#64748B">LLM Providers</text>
  <rect x="550" y="-12" width="15" height="15" rx="2" fill="#FEF9C3" stroke="#CA8A04"/>
  <text x="570" y="0" font-family="Arial" font-size="10" fill="#64748B">Memory</text>
</g>

