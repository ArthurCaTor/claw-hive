<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#FAFAFA"/>

<!-- Title -->
<text x="550" y="40" font-family="Arial" font-size="28" font-weight="bold" fill="#1E293B" text-anchor="middle">Sync Worker Architecture</text>
<text x="550" y="65" font-family="Arial" font-size="14" fill="#64748B" text-anchor="middle">Sidecar Service for PostgreSQL Synchronization</text>

<!-- Status Badge -->
<rect x="800" y="20" width="250" height="40" rx="20" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
<text x="925" y="47" font-family="Arial" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">✅ OPTIONAL / SIDECAR</text>

<!-- ============ Section 1: Key Design Principles ============ -->
<rect x="50" y="90" width="1000" height="90" rx="12" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
<text x="70" y="120" font-family="Arial" font-size="14" font-weight="bold" fill="#059669">🔑 KEY DESIGN PRINCIPLES</text>

<text x="70" y="148" font-family="Arial" font-size="11" fill="#475569">✓ 100% Independent from Core System - Core does NOT know this worker exists</text>
<text x="70" y="168" font-family="Arial" font-size="11" fill="#475569">✓ Core writes JSONL → If worker fails, core continues normally (no dependency)</text>
<text x="70" y="188" font-family="Arial" font-size="11" fill="#475569">✓ Only affects: historical data analytics in PostgreSQL</text>

<!-- ============ Section 2: Data Flow ============ -->
<rect x="50" y="200" width="1000" height="220" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
<text x="70" y="230" font-family="Arial" font-size="16" font-weight="bold" fill="#EA580C">📊 DATA FLOW (Async / Optional)</text>

<!-- Source: JSONL Files -->
<rect x="100" y="260" width="220" height="100" rx="10" fill="#FFFFFF" stroke="#06B6D4" stroke-width="3"/>
<text x="210" y="290" font-family="Arial" font-size="13" font-weight="bold" fill="#06B6D4" text-anchor="middle">JSONL Files (Source)</text>
<text x="210" y="315" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">claw-hive/captures/*.jsonl</text>
<text x="210" y="335" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Written by: Core System</text>
<text x="210" y="355" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Format: One JSON per line</text>

<!-- Arrow -->
<line x1="320" y1="310" x2="420" y2="310" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
<text x="370" y="295" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">file changes</text>
<text x="370" y="310" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">(async, optional)</text>

<!-- Sync Worker -->
<rect x="440" y="250" width="220" height="120" rx="10" fill="#EA580C" filter="url(#shadow)"/>
<text x="550" y="285" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Sync Worker</text>
<text x="550" y="308" font-family="Arial" font-size="11" fill="#DDD" text-anchor="middle">Background Process</text>
<text x="550" y="330" font-family="Arial" font-size="10" fill="#AAD" text-anchor="middle">Technology: Node.js + chokidar + pg</text>
<text x="550" y="355" font-family="Arial" font-size="10" fill="#AAD" text-anchor="middle">Location: sync-worker/index.js</text>

<!-- Arrow -->
<line x1="660" y1="310" x2="760" y2="310" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
<text x="710" y="295" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">insert</text>
<text x="710" y="310" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">(batch)</text>

<!-- Target: PostgreSQL -->
<rect x="780" y="260" width="220" height="100" rx="10" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3"/>
<text x="890" y="290" font-family="Arial" font-size="13" font-weight="bold" fill="#3B82F6" text-anchor="middle">PostgreSQL (Target)</text>
<text x="890" y="315" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">openclaw_memory.claw_hive</text>
<text x="890" y="335" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">For: Analytics &amp; Long-term Storage</text>
<text x="890" y="355" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Status: 82+ records synced</text>

<!-- Failure Impact -->
<rect x="100" y="380" width="950" height="35" rx="6" fill="#FEE2E2"/>
<text x="575" y="403" font-family="Arial" font-size="12" fill="#DC2626" text-anchor="middle">⚠️ If Sync Worker fails: Core System continues normally | Only PostgreSQL analytics are affected</text>

<!-- ============ Section 3: Components ============ -->
<rect x="50" y="450" width="1000" height="280" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
<text x="70" y="480" font-family="Arial" font-size="16" font-weight="bold" fill="#475569">🔧 COMPONENTS</text>

<!-- Component 1: File Watcher -->
<rect x="80" y="500" width="230" height="100" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="195" y="530" font-family="Arial" font-size="12" font-weight="bold" fill="#EA580C" text-anchor="middle">1. File Watcher</text>
<text x="195" y="555" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Library: chokidar</text>
<text x="195" y="575" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Watch for .jsonl file changes</text>
<text x="195" y="592" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Detect new lines appended</text>
<text x="195" y="609" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Debounce writes (1s stability)</text>

<!-- Component 2: Line Parser -->
<rect x="335" y="500" width="230" height="100" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="450" y="530" font-family="Arial" font-size="12" font-weight="bold" fill="#EA580C" text-anchor="middle">2. Line Parser</text>
<text x="450" y="555" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Process: JSON.parse each line</text>
<text x="450" y="575" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Skip invalid JSON (warn)</text>
<text x="450" y="592" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Map fields to DB schema</text>
<text x="450" y="609" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Handle large files (10MB chunks)</text>

<!-- Component 3: Batch Buffer -->
<rect x="590" y="500" width="230" height="100" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="705" y="530" font-family="Arial" font-size="12" font-weight="bold" fill="#EA580C" text-anchor="middle">3. Batch Buffer</text>
<text x="705" y="555" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Trigger: 100 records OR 5 seconds</text>
<text x="705" y="575" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Reduces DB connections</text>
<text x="705" y="592" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Flush on size threshold</text>
<text x="705" y="609" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Auto-flush on timer</text>

<!-- Component 4: Checkpoint -->
<rect x="845" y="500" width="180" height="100" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="935" y="530" font-family="Arial" font-size="12" font-weight="bold" fill="#EA580C" text-anchor="middle">4. Checkpoint</text>
<text x="935" y="555" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">File: .sync-checkpoint.json</text>
<text x="935" y="575" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Save file position after flush</text>
<text x="935" y="592" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Resume after restart</text>
<text x="935" y="609" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Debounced writes (1s)</text>

<!-- Component 5: PG Client + Error Handler Row 2 -->
<rect x="80" y="620" width="230" height="90" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="195" y="650" font-family="Arial" font-size="12" font-weight="bold" fill="#EA580C" text-anchor="middle">5. PostgreSQL Client</text>
<text x="195" y="675" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Library: pg (node-postgres)</text>
<text x="195" y="695" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Connection pooling</text>
<text x="195" y="712" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Auto-create schema/tables</text>

<rect x="335" y="620" width="230" height="90" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="450" y="650" font-family="Arial" font-size="12" font-weight="bold" fill="#EA580C" text-anchor="middle">6. Error Handler</text>
<text x="450" y="675" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Strategy: Graceful degradation</text>
<text x="450" y="695" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Retry on DB failure</text>
<text x="450" y="712" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Put failed items back in buffer</text>

<rect x="590" y="620" width="435" height="90" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="807" y="650" font-family="Arial" font-size="12" font-weight="bold" fill="#EA580C" text-anchor="middle">7. Field Mapping</text>
<text x="807" y="675" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Source JSON → DB Schema</text>
<text x="807" y="695" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">capture.agent → agent_id | capture.req.body.model → model | capture.req.tokens → tokens_in</text>

<!-- ============ Section 4: Database Schema ============ -->
<rect x="50" y="750" width="1000" height="130" rx="12" fill="#F1F5F9" stroke="#3B82F6" stroke-width="2"/>
<text x="70" y="780" font-family="Arial" font-size="16" font-weight="bold" fill="#3B82F6">🗄️ PostgreSQL SCHEMA (claw_hive)</text>

<rect x="100" y="800" width="400" height="70" rx="8" fill="#3B82F6"/>
<text x="300" y="825" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">captures</text>
<text x="300" y="848" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">id | agent_id | model | provider | tokens_in | tokens_out</text>
<text x="300" y="865" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">latency_ms | status_code | cost_usd | source_file | created_at</text>

<rect x="520" y="800" width="400" height="70" rx="8" fill="#3B82F6"/>
<text x="720" y="825" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">llm_switches</text>
<text x="720" y="848" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">id | agent_id | from_provider | from_model</text>
<text x="720" y="865" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">to_provider | to_model | switched_at</text>

<!-- ============ Section 5: Management ============ -->
<rect x="50" y="900" width="1000" height="130" rx="12" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
<text x="70" y="930" font-family="Arial" font-size="16" font-weight="bold" fill="#059669">⚙️ MANAGEMENT (fix-proxy.sh)</text>

<rect x="100" y="950" width="850" height="70" rx="8" fill="#FFFFFF"/>
<text x="120" y="975" font-family="Courier" font-size="11" fill="#475569">./fix-proxy.sh sync-start   # Start: nohup node sync-worker/index.js > /tmp/sync-worker.log 2>&1 &amp;</text>
<text x="120" y="998" font-family="Courier" font-size="11" fill="#475569">./fix-proxy.sh sync-stop    # Stop: pkill -f "sync-worker"</text>
<text x="120" y="1021" font-family="Courier" font-size="11" fill="#475569">./fix-proxy.sh sync-status  # Check: shows PID + recent log lines</text>

<!-- ============ Legend ============ -->
<rect x="50" y="1005" width="1000" height="40" rx="8" fill="#1E293B"/>
<text x="70" y="1030" font-family="Arial" font-size="10" fill="#94A3B8">Legend:</text>
<rect x="140" y="1021" width="12" height="12" rx="2" fill="#EA580C"/>
<text x="158" y="1032" font-family="Arial" font-size="9" fill="white">Worker Components</text>
<rect x="300" y="1021" width="12" height="12" rx="2" fill="#3B82F6"/>
<text x="318" y="1032" font-family="Arial" font-size="9" fill="white">Database</text>
<rect x="420" y="1021" width="12" height="12" rx="2" fill="#06B6D4"/>
<text x="438" y="1032" font-family="Arial" font-size="9" fill="white">Source Files</text>

<text x="1000" y="1032" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="end">v2.1 | 2026-03-18</text>

</svg>
