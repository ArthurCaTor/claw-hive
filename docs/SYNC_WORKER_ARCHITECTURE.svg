<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
  </marker>
  <marker id="dashed-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#FAFAFA"/>

<!-- Title -->
<text x="500" y="40" font-family="Arial" font-size="28" font-weight="bold" fill="#1E293B" text-anchor="middle">Sync Worker Architecture</text>
<text x="500" y="65" font-family="Arial" font-size="14" fill="#64748B" text-anchor="middle">Sidecar Service for PostgreSQL Synchronization</text>

<!-- Status Badge -->
<rect x="750" y="25" width="200" height="35" rx="17" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
<text x="850" y="48" font-family="Arial" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">✅ OPTIONAL / SIDECAR</text>

<!-- ============ Section 1: Data Flow ============ -->
<rect x="50" y="100" width="900" height="200" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
<text x="70" y="130" font-family="Arial" font-size="16" font-weight="bold" fill="#EA580C">Data Flow (Async / Optional)</text>

<!-- Source -->
<rect x="100" y="160" width="200" height="80" rx="10" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2"/>
<text x="200" y="190" font-family="Arial" font-size="12" font-weight="bold" fill="#06B6D4" text-anchor="middle">JSONL Files (Source)</text>
<text x="200" y="210" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">claw-hive/captures/*.jsonl</text>
<text x="200" y="228" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">Written by Core System</text>

<!-- Arrow -->
<line x1="300" y1="200" x2="380" y2="200" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
<text x="340" y="185" font-family="Arial" font-size="9" fill="#64748B" text-anchor="middle">file changes</text>

<!-- Sync Worker -->
<rect x="400" y="150" width="200" height="100" rx="10" fill="#EA580C" filter="url(#shadow)"/>
<text x="500" y="185" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Sync Worker</text>
<text x="500" y="205" font-family="Arial" font-size="10" fill="#DDD" text-anchor="middle">Background Process</text>
<text x="500" y="225" font-family="Arial" font-size="9" fill="#AAD" text-anchor="middle">Node.js + chokidar</text>

<!-- Arrow -->
<line x1="600" y1="200" x2="680" y2="200" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
<text x="640" y="185" font-family="Arial" font-size="9" fill="#64748B" text-anchor="middle">insert</text>

<!-- Target -->
<rect x="700" y="160" width="200" height="80" rx="10" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
<text x="800" y="190" font-family="Arial" font-size="12" font-weight="bold" fill="#3B82F6" text-anchor="middle">PostgreSQL (Target)</text>
<text x="800" y="210" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">openclaw_memory.claw_hive</text>
<text x="800" y="228" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">For Analytics</text>

<!-- Note -->
<rect x="100" y="260" width="850" height="30" rx="6" fill="#FEE2E2"/>
<text x="525" y="280" font-family="Arial" font-size="11" fill="#DC2626" text-anchor="middle">⚠️ If Sync Worker fails: Core System continues normally | Only Analytics are affected</text>

<!-- ============ Section 2: Components ============ -->
<rect x="50" y="320" width="900" height="250" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
<text x="70" y="350" font-family="Arial" font-size="16" font-weight="bold" fill="#475569">Components</text>

<!-- Component 1: File Watcher -->
<rect x="80" y="375" width="260" height="100" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="210" y="405" font-family="Arial" font-size="13" font-weight="bold" fill="#EA580C" text-anchor="middle">1. File Watcher</text>
<text x="210" y="430" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Library: chokidar</text>
<text x="210" y="450" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Watch for .jsonl file changes</text>
<text x="210" y="465" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Detect new lines appended</text>

<!-- Component 2: Line Parser -->
<rect x="370" y="375" width="260" height="100" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="500" y="405" font-family="Arial" font-size="13" font-weight="bold" fill="#EA580C" text-anchor="middle">2. Line Parser</text>
<text x="500" y="430" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">JSON.parse each line</text>
<text x="500" y="450" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Skip invalid JSON</text>
<text x="500" y="465" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Map fields to schema</text>

<!-- Component 3: Batch Buffer -->
<rect x="660" y="375" width="260" height="100" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="790" y="405" font-family="Arial" font-size="13" font-weight="bold" fill="#EA580C" text-anchor="middle">3. Batch Buffer</text>
<text x="790" y="430" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">100 records OR 5 seconds</text>
<text x="790" y="450" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Reduces DB connections</text>
<text x="790" y="465" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Flush on size/time threshold</text>

<!-- Component 4: Checkpoint -->
<rect x="80" y="490" width="260" height="65" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="210" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#EA580C" text-anchor="middle">4. Checkpoint (.sync-checkpoint.json)</text>
<text x="210" y="540" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Save file position after each flush</text>

<!-- Component 5: PG Client -->
<rect x="370" y="490" width="260" height="65" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="500" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#EA580C" text-anchor="middle">5. PostgreSQL Client</text>
<text x="500" y="540" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• npm: pg (node-postgres)</text>

<!-- Component 6: Error Handler -->
<rect x="660" y="490" width="260" height="65" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
<text x="790" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#EA580C" text-anchor="middle">6. Error Handler</text>
<text x="790" y="540" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">• Retry on failure | Log errors</text>

<!-- ============ Section 3: Database Schema ============ -->
<rect x="50" y="590" width="900" height="130" rx="12" fill="#F1F5F9" stroke="#3B82F6" stroke-width="2"/>
<text x="70" y="620" font-family="Arial" font-size="16" font-weight="bold" fill="#3B82F6">PostgreSQL Schema (claw_hive)</text>

<!-- Table 1: captures -->
<rect x="100" y="645" width="350" height="60" rx="8" fill="#3B82F6"/>
<text x="275" y="670" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">captures</text>
<text x="275" y="688" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">agent_id, model, tokens_in, tokens_out, cost_usd, created_at</text>

<!-- Table 2: llm_switches -->
<rect x="500" y="645" width="350" height="60" rx="8" fill="#3B82F6"/>
<text x="675" y="670" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">llm_switches</text>
<text x="675" y="688" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">agent_id, from_provider, to_provider, switched_at</text>

<!-- ============ Section 4: Management ============ -->
<rect x="50" y="740" width="900" height="130" rx="12" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
<text x="70" y="770" font-family="Arial" font-size="16" font-weight="bold" fill="#059669">Management (fix-proxy.sh)</text>

<rect x="100" y="790" width="780" height="65" rx="8" fill="#FFFFFF"/>
<text x="120" y="815" font-family="Courier" font-size="11" fill="#475569">./fix-proxy.sh sync-start   # Start Sync Worker (nohup node sync-worker/index.js &gt; /tmp/sync-worker.log)</text>
<text x="120" y="840" font-family="Courier" font-size="11" fill="#475569">./fix-proxy.sh sync-stop    # Stop Sync Worker (pkill -f "sync-worker")</text>
<text x="490" y="815" font-family="Courier" font-size="11" fill="#475569">./fix-proxy.sh sync-status  # Check status + log tail</text>

<!-- ============ Section 5: Key Points ============ -->
<rect x="50" y="885" width="900" height="75" rx="12" fill="#1E293B"/>
<text x="70" y="912" font-family="Arial" font-size="12" font-weight="bold" fill="#94A3B8">Design Principles</text>
<text x="70" y="932" font-family="Arial" font-size="10" fill="#CBD5E1">✓ 100% Independent from Core System</text>
<text x="70" y="950" font-family="Arial" font-size="10" fill="#CBD5E1">✓ Core writes JSONL → Sync Worker reads → If worker fails, core continues normally</text>
<text x="490" y="932" font-family="Arial" font-size="10" fill="#CBD5E1">✓ Checkpoint enables resume after restart</text>
<text x="490" y="950" font-family="Arial" font-size="10" fill="#CBD5E1">✓ Batch insert reduces DB load</text>

<text x="950" y="950" font-family="Arial" font-size="9" fill="#64748B" text-anchor="end">v2.1 | 2026-03-18</text>

</svg>
