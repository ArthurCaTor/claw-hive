<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="750" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="white"/>
<text x="600" y="30" font-family="Arial" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">Claw-Hive System Blueprint</text>

<!-- Users -->
<g transform="translate(0,50)">
<text x="600" y="25" font-family="Arial" font-size="14" fill="#64748B" text-anchor="middle">Users (Telegram)</text>
<rect x="60" y="40" width="80" height="45" rx="6" fill="#4F46E5"/><text x="100" y="67" font-family="Arial" font-size="10" fill="white" text-anchor="middle">User A</text><text x="100" y="80" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">MiniMax</text>
<rect x="180" y="40" width="80" height="45" rx="6" fill="#4F46E5"/><text x="220" y="67" font-family="Arial" font-size="10" fill="white" text-anchor="middle">User B</text><text x="220" y="80" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">MiniMax</text>
<rect x="300" y="40" width="80" height="45" rx="6" fill="#4F46E5"/><text x="340" y="67" font-family="Arial" font-size="10" fill="white" text-anchor="middle">User C</text><text x="340" y="80" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">OpenAI</text>
<rect x="420" y="40" width="80" height="45" rx="6" fill="#4F46E5"/><text x="460" y="67" font-family="Arial" font-size="10" fill="white" text-anchor="middle">User D</text><text x="460" y="80" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">OpenAI</text>
<rect x="540" y="40" width="80" height="45" rx="6" fill="#4F46E5"/><text x="580" y="67" font-family="Arial" font-size="10" fill="white" text-anchor="middle">User E</text><text x="580" y="80" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Claude</text>
<rect x="660" y="40" width="80" height="45" rx="6" fill="#4F46E5"/><text x="700" y="67" font-family="Arial" font-size="10" fill="white" text-anchor="middle">User F</text><text x="700" y="80" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Claude</text>
</g>

<!-- Arrows to Gateway -->
<line x1="100" y1="85" x2="600" y2="150" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="220" y1="85" x2="600" y2="150" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="340" y1="85" x2="600" y2="150" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="460" y1="85" x2="600" y2="150" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="580" y1="85" x2="600" y2="150" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="700" y1="85" x2="600" y2="150" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

<!-- Gateway -->
<rect x="450" y="150" width="300" height="45" rx="6" fill="#7C3AED"/>
<text x="600" y="177" font-family="Arial" font-size="12" fill="white" text-anchor="middle">OpenClaw Gateway (Telegram Router)</text>

<!-- Arrow to Server -->
<line x1="600" y1="195" x2="600" y2="240" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

<!-- Server -->
<rect x="250" y="240" width="700" height="100" rx="8" fill="#059669"/>
<text x="600" y="265" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">claw-hive Server (:8080)</text>
<rect x="270" y="285" width="660" height="40" rx="4" fill="#047857"/>
<text x="600" y="310" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Agent 1    Agent 2    Agent 3    Agent 4    Agent 5    Agent 6</text>

<!-- Arrow to Proxy -->
<line x1="600" y1="340" x2="600" y2="380" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

<!-- Proxy -->
<rect x="400" y="380" width="400" height="50" rx="6" fill="#DC2626"/>
<text x="600" y="410" font-family="Arial" font-size="11" fill="white" text-anchor="middle">LLM Proxy (:8999) + captures[] (内存100条)</text>

<!-- Arrows to Providers -->
<line x1="500" y1="430" x2="200" y2="470" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="500" y1="430" x2="600" y2="470" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="500" y1="430" x2="1000" y2="470" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

<!-- Providers -->
<rect x="150" y="470" width="100" height="45" rx="6" fill="#EA580C"/><text x="200" y="497" font-family="Arial" font-size="10" fill="white" text-anchor="middle">MiniMax</text><text x="200" y="510" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">M2.5</text>
<rect x="550" y="470" width="100" height="45" rx="6" fill="#EA580C"/><text x="600" y="497" font-family="Arial" font-size="10" fill="white" text-anchor="middle">OpenAI</text><text x="600" y="510" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">GPT-4o</text>
<rect x="950" y="470" width="100" height="45" rx="6" fill="#EA580C"/><text x="1000" y="497" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Claude</text><text x="1000" y="510" font-family="Arial" font-size="9" fill="#DDD" text-anchor="middle">Sonnet</text>

<!-- Arrows to Storage -->
<line x1="350" y1="515" x2="400" y2="550" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="650" y1="515" x2="600" y2="550" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>
<line x1="950" y1="515" x2="800" y2="550" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

<!-- Storage -->
<rect x="200" y="550" width="800" height="60" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
<text x="600" y="575" font-family="Arial" font-size="12" font-weight="bold" fill="#64748B" text-anchor="middle">File System</text>
<text x="600" y="595" font-family="Arial" font-size="11" fill="#64748B" text-anchor="middle">~/.openclaw/workspace-{agent}/sessions/ | memory/ | captures/</text>

<!-- LLM Providers External -->
<text x="200" y="640" font-family="Arial" font-size="12" fill="#EA580C" text-anchor="middle">api.minimax.io</text>
<text x="600" y="640" font-family="Arial" font-size="12" fill="#EA580C" text-anchor="middle">api.openai.com</text>
<text x="1000" y="640" font-family="Arial" font-size="12" fill="#EA580C" text-anchor="middle">api.anthropic.com</text>
</svg>
